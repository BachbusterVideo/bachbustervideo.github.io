<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bachbuster Video — VHS Catalog</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --bb-blue:   #1A1A8C;
  --bb-yellow: #FFB800;
  --bb-silver: #B0B0C0;
  --bg:        #0d0d2e;
  --surface:   #12124a;
  --card:      #16165a;
  --border:    #2a2a7a;
  --text:      #e8e8ff;
  --muted:     #7070aa;
  --scan:      rgba(255,255,255,0.015);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Oswald', sans-serif;
  min-height: 100vh;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scan) 2px, var(--scan) 4px);
}

/* ── Header ── */
header {
  background: var(--bb-blue);
  border-bottom: 4px solid var(--bb-yellow);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 30px rgba(0,0,0,0.8);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: stretch;
  gap: 0;
}
.logo-wrap {
  padding: 10px 20px;
  background: var(--bb-blue);
  display: flex;
  align-items: center;
  border-right: 3px solid var(--bb-yellow);
  flex-shrink: 0;
}
.logo-wrap img {
  height: 60px;
  width: auto;
  display: block;
}
.logo-text {
  font-family: 'Oswald', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--bb-yellow);
  letter-spacing: 3px;
  padding: 0 20px;
  display: flex;
  align-items: center;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  flex: 1;
  flex-wrap: wrap;
}
.tape-count {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  white-space: nowrap;
}
.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 400px;
  margin-left: auto;
}
.search-wrap input {
  width: 100%;
  background: rgba(0,0,20,0.5);
  border: 2px solid rgba(255,184,0,0.4);
  border-radius: 4px;
  color: #fff;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.9rem;
  padding: 9px 14px 9px 36px;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--bb-yellow); }
.search-wrap input::placeholder { color: rgba(255,255,255,0.35); }
.search-wrap::before {
  content: '▶';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--bb-yellow);
  font-size: 0.75rem;
  pointer-events: none;
}

/* ── Cart bar ── */
.cart-bar {
  background: var(--bb-yellow);
  color: #000;
  padding: 0;
  display: none;
  position: sticky;
  top: 84px;
  z-index: 90;
  box-shadow: 0 3px 16px rgba(0,0,0,0.5);
}
.cart-bar.visible { display: block; }
.cart-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  flex-wrap: wrap;
}
.cart-label {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 1px;
}
.cart-items-preview {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  opacity: 0.8;
}
.cart-btn {
  background: #000;
  color: var(--bb-yellow);
  border: none;
  font-family: 'Oswald', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 7px 16px;
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 1px;
  white-space: nowrap;
  transition: background 0.15s;
}
.cart-btn:hover { background: #1a1a1a; }
.cart-btn.clear { background: rgba(0,0,0,0.2); color: #000; }
.cart-btn.clear:hover { background: rgba(0,0,0,0.35); }

/* ── Genre filters ── */
.filters {
  max-width: 1400px;
  margin: 14px auto 0;
  padding: 0 20px 14px;
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
}
.gbtn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem;
  padding: 5px 12px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.gbtn:hover  { border-color: rgba(255,184,0,0.5); color: var(--text); }
.gbtn.active { border-color: var(--bb-yellow); color: var(--bb-yellow); background: rgba(255,184,0,0.08); }

/* ── Grid ── */
main { max-width: 1400px; margin: 0 auto; padding: 20px; }
#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 18px;
}

/* ── Tape card ── */
.tape {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
  position: relative;
  user-select: none;
}
.tape:hover {
  transform: translateY(-4px);
  border-color: var(--bb-yellow);
  box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 16px rgba(255,184,0,0.15);
}
.tape.selected {
  border-color: var(--bb-yellow);
  box-shadow: 0 0 0 3px rgba(255,184,0,0.4), 0 8px 24px rgba(0,0,0,0.6);
}
.tape.selected::after {
  content: '✓';
  position: absolute;
  top: 8px;
  right: 8px;
  width: 26px;
  height: 26px;
  background: var(--bb-yellow);
  color: #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 900;
  line-height: 26px;
  text-align: center;
  z-index: 2;
}
.tape-poster {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
  background: #0a0a2e;
}
.tape-genre {
  position: absolute;
  top: 8px;
  left: 8px;
  background: rgba(26,26,140,0.9);
  color: var(--bb-yellow);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  padding: 2px 7px;
  border-radius: 2px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 1px solid rgba(255,184,0,0.4);
}
.tape-info {
  padding: 10px 10px 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  border-top: 2px solid var(--border);
}
.tape-title {
  font-size: 0.85rem;
  font-weight: 600;
  line-height: 1.3;
  color: #fff;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.tape-meta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
}
.tape-price {
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--bb-yellow);
  margin-top: auto;
  padding-top: 4px;
}
.tape-condition {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: var(--bb-silver);
}
/* Quick-add button on card */
.quick-add {
  position: absolute;
  bottom: 10px;
  right: 8px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bb-yellow);
  color: #000;
  border: none;
  font-size: 1.1rem;
  font-weight: 900;
  line-height: 28px;
  text-align: center;
  cursor: pointer;
  z-index: 3;
  transition: transform 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
.quick-add:hover { transform: scale(1.15); }
.tape.selected .quick-add {
  background: #fff;
  color: #000;
}

/* ── Detail modal ── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,10,0.92);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
#overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 2px solid var(--bb-yellow);
  border-radius: 8px;
  max-width: 660px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 0 60px rgba(0,0,0,0.95), 0 0 40px rgba(255,184,0,0.1);
  position: relative;
}
.modal-header {
  background: var(--bb-blue);
  border-bottom: 3px solid var(--bb-yellow);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.modal-header-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--bb-yellow);
  letter-spacing: 1px;
  flex: 1;
}
.modal-x {
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  font-size: 1.3rem;
  cursor: pointer;
  line-height: 1;
  transition: color 0.15s;
}
.modal-x:hover { color: var(--bb-yellow); }
.modal-body {
  display: flex;
  gap: 20px;
  padding: 20px;
}
.modal-poster {
  width: 180px;
  flex-shrink: 0;
  border-radius: 4px;
  overflow: hidden;
  border: 2px solid var(--border);
  align-self: flex-start;
}
.modal-poster img { width: 100%; display: block; }
.modal-info { flex: 1; min-width: 0; }
.modal-title {
  font-size: 1.4rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 4px;
}
.modal-year {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 14px;
}
.modal-genre {
  display: inline-block;
  background: var(--bb-blue);
  color: var(--bb-yellow);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  padding: 3px 10px;
  border-radius: 3px;
  border: 1px solid rgba(255,184,0,0.4);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.modal-overview {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.65);
  line-height: 1.6;
  margin-bottom: 14px;
}
.drow { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
.dlabel {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  min-width: 80px;
  padding-top: 1px;
  flex-shrink: 0;
}
.dval { font-size: 0.88rem; color: var(--text); }
.dval.price { color: var(--bb-yellow); font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
}
.modal-add-btn {
  background: var(--bb-yellow);
  color: #000;
  border: none;
  font-family: 'Oswald', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 10px 24px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.15s;
  flex: 1;
}
.modal-add-btn:hover { background: #ffc820; }
.modal-add-btn.remove { background: var(--border); color: var(--text); }
.modal-add-btn.remove:hover { background: #3a3a8a; }

/* ── Copy modal ── */
#copy-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,10,0.92);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#copy-modal.open { display: flex; }
.copy-box {
  background: var(--surface);
  border: 2px solid var(--bb-yellow);
  border-radius: 8px;
  max-width: 580px;
  width: 100%;
  overflow: hidden;
}
.copy-header {
  background: var(--bb-blue);
  border-bottom: 3px solid var(--bb-yellow);
  padding: 14px 18px;
  display: flex;
  align-items: center;
}
.copy-header-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--bb-yellow);
  letter-spacing: 1px;
  flex: 1;
}
.copy-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.ctab {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  cursor: pointer;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.15s;
  border-bottom: 2px solid transparent;
}
.ctab.active { color: var(--bb-yellow); border-bottom-color: var(--bb-yellow); }
.copy-content {
  padding: 16px;
}
.copy-textarea {
  width: 100%;
  height: 200px;
  background: #0a0a20;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.78rem;
  padding: 12px;
  resize: vertical;
  outline: none;
  line-height: 1.6;
}
.copy-actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}
.copy-do-btn {
  background: var(--bb-yellow);
  color: #000;
  border: none;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  padding: 9px 20px;
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: 1px;
  flex: 1;
}
.copy-do-btn:hover { background: #ffc820; }
.copy-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  padding: 9px 16px;
  border-radius: 4px;
  cursor: pointer;
}
.copy-cancel:hover { color: var(--text); }
.copied-msg {
  display: none;
  color: #6dcf6d;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  padding: 4px 0;
}
.copied-msg.show { display: block; }

/* ── Empty ── */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.88rem;
  letter-spacing: 2px;
}
/* ── Decade filters ── */
.decade-row {
  max-width: 1400px;
  margin: 0 auto;
  padding: 10px 20px 6px;
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.decade-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-right: 4px;
}
.dbtn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.68rem;
  padding: 4px 11px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
}
.dbtn:hover  { border-color: rgba(255,184,0,0.5); color: var(--text); }
.dbtn.active { border-color: var(--bb-yellow); color: var(--bb-yellow); background: rgba(255,184,0,0.08); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,184,0,0.4); }

@media (max-width: 600px) {
  .modal-body { flex-direction: column; }
  .modal-poster { width: 100%; max-width: 200px; margin: 0 auto; }
  #grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
  .logo-wrap img { height: 44px; }
}
</style>
</head>

  <div class="header-inner">

var cart   = {};
var activeGenre  = 'ALL';
var activeDecade = 'ALL';
var currentTape  = null;

// ── Filter & render ───────────────────────────────────────────────────────────
function setGenre(btn, g) {
  activeGenre = g;
  document.querySelectorAll('.gbtn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

function setDecade(btn, d) {
  activeDecade = d;
  document.querySelectorAll('.dbtn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid();
}

document.getElementById('search').addEventListener('input', renderGrid);

function renderGrid() {
  var q    = document.getElementById('search').value.toLowerCase();
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  var visible = TAPES.filter(function(t) {
    var mq = !q || t.title.toLowerCase().indexOf(q)>-1 || (t.matched||'').toLowerCase().indexOf(q)>-1;
    var mg = activeGenre==='ALL' || t.genre===activeGenre;
    var md = activeDecade==='ALL' || t.decade===activeDecade;
    return mq && mg && md;
  });
  document.getElementById('count').textContent = visible.length + ' title' + (visible.length!==1?'s':'');
  if (!visible.length) {
    grid.innerHTML = '<div class="empty">[ NO TAPES FOUND ]</div>';
    return;
  }
  visible.forEach(function(t) { grid.appendChild(makeCard(t)); });
}

function makeCard(t) {
  var div = document.createElement('div');
  div.className = 'tape' + (cart[t.title] ? ' selected' : '');
  div.dataset.title = t.title;

  var genre = t.tmdb_genre ? t.tmdb_genre.split(',')[0].trim() : t.genre;

  if (genre) {
    var gb = document.createElement('div');
    gb.className = 'tape-genre';
    gb.textContent = genre;
    div.appendChild(gb);
  }

  var img = document.createElement('img');
  img.className = 'tape-poster';
  img.src = t.poster || PH;
  img.alt = t.title;
  img.onerror = function(){ this.src = PH; };
  div.appendChild(img);

  var info = document.createElement('div');
  info.className = 'tape-info';

  var titleEl = document.createElement('div');
  titleEl.className = 'tape-title';
  titleEl.textContent = t.matched || t.title;
  info.appendChild(titleEl);

  if (t.year) {
    var metaEl = document.createElement('div');
    metaEl.className = 'tape-meta';
    metaEl.textContent = t.year;
    info.appendChild(metaEl);
  }

  if (t.condition) {
    var condEl = document.createElement('div');
    condEl.className = 'tape-condition';
    condEl.textContent = t.condition;
    info.appendChild(condEl);
  }

  var priceEl = document.createElement('div');
  priceEl.className = 'tape-price';
  priceEl.textContent = t.ask_price || t.est_value || '';
  info.appendChild(priceEl);

  div.appendChild(info);

  // Quick-add button
  var qbtn = document.createElement('button');
  qbtn.className = 'quick-add';
  qbtn.title = 'Add to my list';
  qbtn.innerHTML = cart[t.title] ? '&#10003;' : '+';
  qbtn.addEventListener('click', function(e) {
    e.stopPropagation(); // don't open modal
    if (cart[t.title]) {
      delete cart[t.title];
    } else {
      cart[t.title] = t;
    }
    updateCartBar();
    // Update this card in place
    div.className = 'tape' + (cart[t.title] ? ' selected' : '');
    qbtn.innerHTML = cart[t.title] ? '&#10003;' : '+';
  });
  div.appendChild(qbtn);

  div.addEventListener('click', function(e) {
    openModal(t);
  });

  return div;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(t) {
  currentTape = t;
  var genre = t.tmdb_genre ? t.tmdb_genre.split(',')[0].trim() : t.genre;
  document.getElementById('m-header').textContent   = 'VHS DETAIL';
  document.getElementById('m-poster').src           = t.poster || PH;
  document.getElementById('m-title').textContent    = t.matched || t.title;
  document.getElementById('m-year').textContent     = t.year ? '(' + t.year + ')' : '';
  document.getElementById('m-genre').textContent    = genre || '';
  document.getElementById('m-overview').textContent = t.overview || t.notes || '';
  document.getElementById('m-price').textContent    = t.ask_price || t.est_value || '—';
  document.getElementById('m-cond').textContent     = t.condition || '—';
  var notesRow = document.getElementById('m-notes-row');
  if (t.notes && t.notes !== (t.overview||'')) {
    document.getElementById('m-notes').textContent = t.notes;
    notesRow.style.display = 'flex';
  } else {
    notesRow.style.display = 'none';
  }
  updateModalCartBtn();
  document.getElementById('overlay').classList.add('open');
}

function updateModalCartBtn() {
  if (!currentTape) return;
  var btn = document.getElementById('m-cart-btn');
  if (cart[currentTape.title]) {
    btn.textContent = '✓ Remove from My List';
    btn.className = 'modal-add-btn remove';
  } else {
    btn.textContent = '+ Add to My List';
    btn.className = 'modal-add-btn';
  }
}

function toggleCartFromModal() {
  if (!currentTape) return;
  if (cart[currentTape.title]) {
    delete cart[currentTape.title];
  } else {
    cart[currentTape.title] = currentTape;
  }
  updateModalCartBtn();
  updateCartBar();
  renderGrid();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  currentTape = null;
}

// ── Cart ──────────────────────────────────────────────────────────────────────
function updateCartBar() {
  var items = Object.values(cart);
  var bar   = document.getElementById('cart-bar');
  if (!items.length) {
    bar.classList.remove('visible');
    return;
  }
  bar.classList.add('visible');
  document.getElementById('cart-label').textContent = items.length + ' TAPE' + (items.length!==1?'S':'') + ' SELECTED';
  document.getElementById('cart-preview').textContent = items.map(function(t){ return t.matched||t.title; }).join('  ·  ');
}

function clearCart() {
  cart = {};
  updateCartBar();
  renderGrid();
}

// ── Copy modal ────────────────────────────────────────────────────────────────
var copyTab = 'plain';

function openCopyModal() {
  updateCopyText();
  document.getElementById('copy-modal').classList.add('open');
  document.getElementById('copied-msg').classList.remove('show');
}

function closeCopyModal() {
  document.getElementById('copy-modal').classList.remove('open');
}

function switchTab(btn, tab) {
  copyTab = tab;
  document.querySelectorAll('.ctab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  updateCopyText();
  document.getElementById('copied-msg').classList.remove('show');
}

function updateCopyText() {
  var items = Object.values(cart);
  var text  = '';
  if (copyTab === 'plain') {
    text = items.map(function(t) {
      var line = (t.matched||t.title);
      if (t.year) line += ' (' + t.year + ')';
      if (t.ask_price||t.est_value) line += ' — ' + (t.ask_price||t.est_value);
      return line;
    }).join('\n');
  } else {
    text = "Hi! I\'m interested in the following tapes from Bachbuster Video:\n\n";
    text += items.map(function(t,i) {
      var line = (i+1) + '. ' + (t.matched||t.title);
      if (t.year) line += ' (' + t.year + ')';
      if (t.ask_price||t.est_value) line += ' — ' + (t.ask_price||t.est_value);
      if (t.condition) line += ' [' + t.condition + ']';
      return line;
    }).join('\n');
    text += '\n\nPlease let me know availability. Thanks!';
  }
  document.getElementById('copy-text').value = text;
}

function doCopy() {
  var ta = document.getElementById('copy-text');
  ta.select();
  ta.setSelectionRange(0, 99999);
  try {
    navigator.clipboard.writeText(ta.value).then(function() {
      showCopied();
    }).catch(function() {
      document.execCommand('copy');
      showCopied();
    });
  } catch(e) {
    document.execCommand('copy');
    showCopied();
  }
}

function showCopied() {
  var msg = document.getElementById('copied-msg');
  msg.classList.add('show');
  setTimeout(function(){ msg.classList.remove('show'); }, 2500);
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') {
    closeModal();
    closeCopyModal();
  }
});

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.getElementById('copy-modal').addEventListener('click', function(e) {
  if (e.target === document.getElementById('copy-modal')) closeCopyModal();
});

renderGrid();
</script>
</body>
</html>
